name: contracts

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"

defaults:
  run:
    working-directory: contracts

jobs:
  test:
    name: forge build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show versions
        run: forge --version

      - name: Build
        run: forge build --sizes

      - name: Format check
        run: forge fmt --check

      - name: Tests (CI profile: heavier fuzz/invariant)
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

  slither:
    name: slither static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: high
