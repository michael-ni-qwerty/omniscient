[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
ffi = false
fs_permissions = [{ access = "read", path = "./out" }]

[profile.default.fuzz]
runs = 1024
max_test_rejects = 1_000_000

[profile.default.invariant]
runs = 512
depth = 64
fail_on_revert = true
call_override = false
shrink_run_limit = 5000

[profile.ci.fuzz]
runs = 10_000

[profile.ci.invariant]
runs = 2048
depth = 128

[rpc_endpoints]
amoy = "https://rpc-amoy.polygon.technology/"

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
int_types = "long"

